name: Build

on:
  push:
    branches: [develop]

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - run: npm run build --if-present

      - name: Publish dist to build branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PUBLISH_DIR="$RUNNER_TEMP/publish"
          mkdir -p "$PUBLISH_DIR"

          cp -r dist "$PUBLISH_DIR/"
          cp package.json package-lock.json "$PUBLISH_DIR/"

          cd "$PUBLISH_DIR"
          git init -b build
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: ${GITHUB_SHA::7} (from ${GITHUB_REF_NAME})"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin build

  notify-changelog:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect CHANGELOG.md in this push
        id: changelog
        run: |
          set -euo pipefail
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -qx 'CHANGELOG.md'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if git show --name-only --pretty="" HEAD | grep -qx 'CHANGELOG.md'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Post changelog embed to Discord
        if: steps.changelog.outputs.changed == 'true'
        env:
          DISCORD_CHANGELOG_WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: python3 .github/scripts/post_changelog_discord.py
